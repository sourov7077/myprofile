<header class="navbar">
    <div class="container">
        <nav class="nav-container">
            <!-- Logo -->
            <div class="nav-logo" data-aos="fade-right">
                <a href="{% url 'home' %}" class="logo-link">
                    <div class="logo-text">
                        <span class="logo-first">{{ profile.user.first_name|default:"Portfolio" }}</span>
                        <span class="logo-last">{{ profile.user.last_name|default:"" }}</span>
                    </div>
                </a>
            </div>

            <!-- Mobile Menu Toggle -->
            <button class="menu-toggle" id="menuToggle">
                <span></span>
                <span></span>
                <span></span>
            </button>

            <!-- Navigation Menu -->
            <ul class="nav-menu" id="navMenu">
                <li class="nav-item" data-aos="fade-down" data-aos-delay="100">
                    <a href="{% url 'home' %}" class="nav-link active">
                        <i class="fas fa-home"></i>
                        <span>Home</span>
                    </a>
                </li>
                <li class="nav-item" data-aos="fade-down" data-aos-delay="200">
                    <a href="#skills" class="nav-link">
                        <i class="fas fa-code"></i>
                        <span>Skills</span>
                    </a>
                </li>
                <li class="nav-item" data-aos="fade-down" data-aos-delay="300">
                    <a href="#projects" class="nav-link">
                        <i class="fas fa-briefcase"></i>
                        <span>Projects</span>
                    </a>
                </li>
                <li class="nav-item" data-aos="fade-down" data-aos-delay="400">
                    <a href="#experience" class="nav-link">
                        <i class="fas fa-timeline"></i>
                        <span>Experience</span>
                    </a>
                </li>
                <li class="nav-item" data-aos="fade-down" data-aos-delay="500">
                    <a href="#contact" class="nav-link">
                        <i class="fas fa-envelope"></i>
                        <span>Contact</span>
                    </a>
                </li>
                <li class="nav-item" data-aos="fade-down" data-aos-delay="600">
                    <a href="{% url 'projects' %}" class="nav-link btn-portfolio">
                        <i class="fas fa-layer-group"></i>
                        <span>All Projects</span>
                    </a>
                </li>
            </ul>

            <!-- Theme Toggle -->
            <div class="theme-toggle" data-aos="fade-left">
                <button class="theme-btn" id="themeToggle">
                    <i class="fas fa-moon"></i>
                    <i class="fas fa-sun"></i>
                </button>
            </div>
        </nav>
    </div>
</header>

<style>
    .navbar {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        z-index: 1000;
        box-shadow: 0 2px 20px rgba(0, 0, 0, 0.1);
        transition: all 0.3s ease;
    }

    .navbar.scrolled {
        background: rgba(255, 255, 255, 0.98);
        box-shadow: 0 5px 30px rgba(0, 0, 0, 0.15);
        padding: 10px 0;
    }

    .nav-container {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px 0;
    }

    .nav-logo .logo-link {
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .logo-text {
        font-size: 1.8rem;
        font-weight: 800;
        background: linear-gradient(135deg, var(--primary), var(--secondary));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }

    .logo-first {
        display: inline-block;
        animation: logoBounce 2s infinite;
    }

    .logo-last {
        display: inline-block;
        animation: logoBounce 2s infinite 0.2s;
    }

    .nav-menu {
        display: flex;
        list-style: none;
        gap: 30px;
        align-items: center;
    }

    .nav-item {
        position: relative;
    }

    .nav-link {
        color: var(--dark);
        text-decoration: none;
        font-weight: 600;
        font-size: 1rem;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 20px;
        border-radius: 25px;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
    }

    .nav-link::before {
        content: '';
        position: absolute;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 0;
        height: 2px;
        background: var(--primary);
        transition: width 0.3s ease;
    }

    .nav-link:hover::before,
    .nav-link.active::before {
        width: 80%;
    }

    .nav-link:hover {
        color: var(--primary);
        background: rgba(99, 102, 241, 0.1);
        transform: translateY(-2px);
    }

    .nav-link.active {
        color: var(--primary);
        background: rgba(99, 102, 241, 0.1);
    }

    .nav-link i {
        font-size: 1.2rem;
    }

    .btn-portfolio {
        background: var(--primary) !important;
        color: white !important;
        padding: 12px 25px !important;
    }

    .btn-portfolio:hover {
        background: var(--secondary) !important;
        transform: translateY(-3px) !important;
        box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3) !important;
    }

    .theme-toggle {
        margin-left: 20px;
    }

    .theme-btn {
        background: var(--dark);
        color: white;
        border: none;
        width: 50px;
        height: 50px;
        border-radius: 50%;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.2rem;
        position: relative;
        overflow: hidden;
        transition: all 0.3s ease;
    }

    .theme-btn i {
        position: absolute;
        transition: all 0.3s ease;
    }

    .theme-btn .fa-moon {
        opacity: 1;
        transform: rotate(0deg);
    }

    .theme-btn .fa-sun {
        opacity: 0;
        transform: rotate(90deg);
    }

    .theme-btn:hover {
        transform: rotate(30deg);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
    }

    /* Dark mode styles */
    .dark-mode .navbar {
        background: rgba(31, 41, 55, 0.95);
    }

    .dark-mode .nav-link {
        color: #f9fafb;
    }

    .dark-mode .nav-link:hover {
        background: rgba(99, 102, 241, 0.2);
    }

    .dark-mode .theme-btn {
        background: var(--light);
        color: var(--dark);
    }

    /* Mobile Menu */
    .menu-toggle {
        display: none;
        background: none;
        border: none;
        cursor: pointer;
        width: 30px;
        height: 30px;
        position: relative;
        z-index: 1001;
    }

    .menu-toggle span {
        display: block;
        width: 100%;
        height: 3px;
        background: var(--dark);
        margin: 5px 0;
        transition: all 0.3s ease;
        border-radius: 3px;
    }

    .dark-mode .menu-toggle span {
        background: var(--light);
    }

    @keyframes logoBounce {
        0%, 100% {
            transform: translateY(0);
        }
        50% {
            transform: translateY(-5px);
        }
    }

    @media (max-width: 992px) {
        .menu-toggle {
            display: block;
        }

        .nav-menu {
            position: fixed;
            top: 0;
            right: -100%;
            width: 300px;
            height: 100vh;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            flex-direction: column;
            justify-content: center;
            gap: 20px;
            transition: right 0.5s ease;
            box-shadow: -5px 0 30px rgba(0, 0, 0, 0.1);
            z-index: 1000;
        }

        .dark-mode .nav-menu {
            background: rgba(31, 41, 55, 0.98);
        }

        .nav-menu.active {
            right: 0;
        }

        .nav-item {
            width: 100%;
            text-align: center;
        }

        .nav-link {
            justify-content: center;
            padding: 15px 30px;
            border-radius: 0;
        }

        .theme-toggle {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
        }

        /* Hamburger animation */
        .menu-toggle.active span:nth-child(1) {
            transform: rotate(45deg) translate(6px, 6px);
        }

        .menu-toggle.active span:nth-child(2) {
            opacity: 0;
        }

        .menu-toggle.active span:nth-child(3) {
            transform: rotate(-45deg) translate(7px, -6px);
        }
    }
</style>

<script>
    // Mobile menu toggle
    document.addEventListener('DOMContentLoaded', function() {
        const menuToggle = document.getElementById('menuToggle');
        const navMenu = document.getElementById('navMenu');
        
        if (menuToggle) {
            menuToggle.addEventListener('click', function() {
                this.classList.toggle('active');
                navMenu.classList.toggle('active');
                document.body.style.overflow = navMenu.classList.contains('active') ? 'hidden' : '';
            });
            
            // Close menu when clicking outside
            document.addEventListener('click', function(event) {
                if (!menuToggle.contains(event.target) && !navMenu.contains(event.target)) {
                    menuToggle.classList.remove('active');
                    navMenu.classList.remove('active');
                    document.body.style.overflow = '';
                }
            });
            
            // Close menu when clicking a link
            navMenu.querySelectorAll('.nav-link').forEach(link => {
                link.addEventListener('click', () => {
                    menuToggle.classList.remove('active');
                    navMenu.classList.remove('active');
                    document.body.style.overflow = '';
                });
            });
        }
        
        // Theme toggle
        const themeToggle = document.getElementById('themeToggle');
        if (themeToggle) {
            // Check for saved theme or prefer-color-scheme
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)');
            const savedTheme = localStorage.getItem('theme');
            
            if (savedTheme === 'dark' || (!savedTheme && prefersDark.matches)) {
                document.body.classList.add('dark-mode');
                themeToggle.querySelector('.fa-moon').style.opacity = '0';
                themeToggle.querySelector('.fa-moon').style.transform = 'rotate(-90deg)';
                themeToggle.querySelector('.fa-sun').style.opacity = '1';
                themeToggle.querySelector('.fa-sun').style.transform = 'rotate(0deg)';
            }
            
            themeToggle.addEventListener('click', function() {
                document.body.classList.toggle('dark-mode');
                
                const isDark = document.body.classList.contains('dark-mode');
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
                
                const moon = this.querySelector('.fa-moon');
                const sun = this.querySelector('.fa-sun');
                
                if (isDark) {
                    moon.style.opacity = '0';
                    moon.style.transform = 'rotate(-90deg)';
                    sun.style.opacity = '1';
                    sun.style.transform = 'rotate(0deg)';
                } else {
                    moon.style.opacity = '1';
                    moon.style.transform = 'rotate(0deg)';
                    sun.style.opacity = '0';
                    sun.style.transform = 'rotate(90deg)';
                }
                
                // Animate theme toggle
                gsap.to(this, {
                    rotation: 360,
                    duration: 0.5,
                    ease: "power2.out"
                });
            });
        }
    });
</script>
